<!--  FORMULARIO  -->

<section class="form-container">

  <h2 class="form-title">Contacto</h2>

  <form id="constructionForm" action="enviar.php" method="POST">

    <div class="form-group">
      <input type="text" name="name" id="inputName" placeholder="Nombre completo" required class="form-input">
    </div>

    <div class="form-group">
      <input type="email" name="email" id="inputEmail" placeholder="Email" required class="form-input">
    </div>

    <div class="form-group">
      <input type="tel" name="phone" id="inputPhone" placeholder="Teléfono" class="form-input">
    </div>

    <div class="form-group">
      <select name="service" id="selectService" class="form-select">
        <option value="obra_nueva">Obra nueva</option>
        <option value="reforma">Reforma</option>
        <option value="rehabilitacion">Rehabilitación</option>
      </select>
    </div>

    <div class="form-group">
      <textarea name="message" id="textareaMessage" placeholder="Mensaje" class="form-textarea"></textarea>
    </div>

    <button type="submit" class="form-button" id="submitButton">
      Enviar solicitud
    </button>

  </form>
</section>
